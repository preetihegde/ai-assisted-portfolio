services:
  - type: web
    name: uttara-api
    runtime: python
    rootDir: backend

    buildCommand: "pip install -r requirements.txt"

    startCommand: "uvicorn app:app --host 0.0.0.0 --port $PORT"

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.4"
      - key: GROQ_API_KEY
        fromDatabase: false
        # Add your actual key in Render dashboard → Environment tab
        # Never commit API keys to git